name: AudioRecordingManager
projectName: AudioRecordingManager
bundleIdPrefix: com.audiorecordingmanager

settings:
  SWIFT_VERSION: "5.9"
  MARKETING_VERSION: "1.0.0"
  CURRENT_PROJECT_VERSION: "1"
  MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  AudioRecordingManager:
    type: application
    platform: macOS
    sources:
      - path: Sources/AudioRecordingManager
    settings:
      PRODUCT_NAME: AudioRecordingManager
      EXECUTABLE_NAME: AudioRecordingManager
      PRODUCT_BUNDLE_IDENTIFIER: com.audiorecordingmanager.app
      INFOPLIST_FILE: Info.plist
      CODE_SIGN_IDENTITY: "-"
      CODE_SIGN_STYLE: Automatic
      PROVISIONING_PROFILE_SPECIFIER: ""

schemes:
  AudioRecordingManager:
    build:
      targets:
        AudioRecordingManager: all
    run:
      config: Debug
    archive:
      config: Release
